<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seker | Anime Streaming</title>
    <meta name="description" content="Seker - Streaming anime subtitle Indonesia dengan tampilan retro yang nyaman di mata.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <!-- Scanline overlay -->
    <div class="scanline-overlay"></div>

    <div class="app-container">
        <!-- Retro Header / Taskbar -->
        <header class="retro-taskbar">
            <div class="taskbar-left">
                <div class="logo" onclick="window.router.navigate('/')">
                    <span class="logo-icon">▶</span>
                    <span class="logo-text">Seker.</span>
                </div>
            <nav class="main-nav">
                    <a href="#" onclick="window.router.navigate('/'); return false;"><ion-icon name="home-outline"></ion-icon> Home</a>
                    <a href="#" onclick="window.router.navigate('/popular'); return false;"><ion-icon name="flame-outline"></ion-icon> Populer</a>
                    <a href="#" onclick="window.router.navigate('/ongoing'); return false;"><ion-icon name="radio-outline"></ion-icon> Ongoing</a>
                    <a href="#" onclick="window.router.navigate('/completed'); return false;"><ion-icon name="checkmark-done-outline"></ion-icon> Tamat</a>
                    <a href="#" onclick="window.router.navigate('/movies'); return false;"><ion-icon name="film-outline"></ion-icon> Movies</a>
                </nav>
            </div>
            <div class="taskbar-right">
                <div class="retro-select-wrap">
                    <select id="sourceSelect" class="retro-select">
                        <option value="animasu">Animasu</option>
                        <option value="otakudesu">Otakudesu</option>
                    </select>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Cari anime...">
                    <button id="searchBtn"><ion-icon name="search-outline"></ion-icon></button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="app">
            <!-- Dynamic Content goes here -->
        </main>

        <!-- Footer -->
        <footer class="retro-footer">
            <p>Seker. © 2026 — Retro Anime Streaming ✦ Powered by Animasu & Otakudesu</p>
        </footer>
    </div>
    
    <!-- Template: Loading -->
    <template id="tmpl-loading">
        <div class="loading-state">
            <div class="retro-loader">
                <div class="loader-bar">
                    <div class="loader-fill"></div>
                </div>
                <p>Loading data...</p>
            </div>
        </div>
    </template>

    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
